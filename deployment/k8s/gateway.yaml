apiVersion: apps/v1
kind: Deployment
metadata:
  name: cic-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cic-gateway
  template:
    metadata:
      labels:
        app: cic-gateway
    spec:
      containers:
        - name: gateway
          image: cic-gateway:latest
          ports:
            - containerPort: 80
