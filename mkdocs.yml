plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.emoji
  - tables
  - toc:
      toc_depth: 3
  - codehilite
  - smarty
  - sane_lists

extra:
