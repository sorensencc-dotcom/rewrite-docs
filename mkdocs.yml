site_name: CIC + Rewrite Labs Knowledge Base
site_description: >
  Unified governance documentation for the Cognitive Intelligence Core (CIC)
  and Rewrite Labs (RL) platform — covering architecture, knowledge-base
  operations, skill governance, system state, and operational runbooks.
site_author: Rewrite Labs Engineering
docs_dir: docs
site_dir: site

repo_url: https://github.com/rewrite-labs/cic-kb
repo_name: rewrite-labs/cic-kb
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
    - toc.follow
    - toc.integrate

plugins:
  - search:
      lang: en
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
      title: On this page

nav:
  - Home: index-unified.md

  - Architecture:
    - Overview: architecture/overview.md
    - CIC System: architecture/CIC_SYSTEM.md
    - CIC State: architecture/CIC_STATE.md
    - Data Flow: architecture/data-flow.md
    - Security Model: architecture/security.md

  - Knowledge Base:
    - KB Operations: kb/KB-OPERATIONS.md
    - Naming Conventions: kb/naming-conventions.md
    - File Movement Protocol: kb/file-movement-protocol.md
    - Validation Workflows: kb/validation-workflows.md
    - Taxonomy & Tags: kb/taxonomy.md

  - Skills & Toolforge:
    - Skills Governance Guide: skills/toolforge-skills-governance.md
    - Skill Authoring: skills/authoring.md
    - Skill Versioning: skills/versioning.md
    - Skill Testing: skills/testing.md
    - Skill Registry: skills/registry.md

  - Operations:
    - Runbooks: ops/runbooks.md
    - Incident Response: ops/incident-response.md
    - Change Management: ops/change-management.md
    - Monitoring & Alerts: ops/monitoring.md

  - Reference:
    - Glossary: reference/glossary.md
    - API Reference: reference/api.md
    - Changelog: reference/changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rewrite-labs/cic-kb
  version:
    provider: mike

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js
