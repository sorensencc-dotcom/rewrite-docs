# phase0.7-routing.yaml - Phase 0.7 Message Routing Definition
version: "0.7.0"
updated_at: "2026-06-11T23:02:00Z"

channels:
  - name: "cic.events"
    from: "cic.ingestion"
    to: "cic.evolution"
    encoding: "JSON"
    retention: "24h"
    visibility: "internal"
    policy_pack: "cic.routing"

  - name: "labs.discovery.requests"
    from: "cic.evolution"
    to: "labs.discovery"
    encoding: "JSON"
    retention: "24h"
    visibility: "internal"
    policy_pack: "cic.routing"

  - name: "labs.extractor.requests"
    from: "labs.discovery"
    to: "labs.extractor"
    encoding: "JSON"
    retention: "24h"
    visibility: "internal"
    policy_pack: "cic.routing"

  - name: "labs.redesign.requests"
    from: "labs.extractor"
    to: "labs.redesign.gpu"
    encoding: "JSON"
    retention: "24h"
    visibility: "internal"
    policy_pack: "cic.routing"

  - name: "labs.outreach.requests"
    from: "labs.redesign.gpu"
    to: "labs.outreach"
    encoding: "JSON"
    retention: "24h"
    visibility: "internal"
    policy_pack: "cic.routing"

  - name: "inference.requests"
    from: "labs.redesign.gpu"
    to: "inference.nemotron"
    encoding: "JSON"
    retention: "24h"
    visibility: "internal"
    policy_pack: "cic.routing"

  - name: "cic.telemetry"
    from: "*"
    to: "cic.observability"
    encoding: "JSON"
    retention: "7d"
    visibility: "internal"
    policy_pack: "cic.routing"
