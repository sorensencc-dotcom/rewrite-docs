name: Phase 0.7 Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: 'Deploy to target environment:'
        options:
          - staging
          - production
      phase:
        description: 'Target deployment agent'
        required: true
        default: 'all'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Configure Git
        run: git config --global submodule.recurse false

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker Images
        run: |
          echo "Building Docker images for Phase 0.7..."
          docker build -t cic-ingestion:0.7.0 -f cic-ingestion/Dockerfile cic-ingestion/ || \
          docker-compose build cic-ingestion || \
          echo "Build failed; image may need manual creation"

      - name: Publish Docker Images
        run: |
          echo "Deploying target agent: ${{ github.event.inputs.phase }} to ${{ github.event.inputs.environment }}"
          # Push published build targets
          docker tag cic-ingestion:0.7.0 registry.cic.dev/cic-ingestion:${{ github.event.inputs.environment }} || true
          docker push registry.cic.dev/cic-ingestion:${{ github.event.inputs.environment }} || true
