name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Checkout submodules (private submodule authenticated separately)
        run: |
          git config --global url."https://x-access-token:${{ secrets.SUBMODULE_PAT }}@github.com/sorensencc-dotcom/claude-setup.git".insteadOf "https://github.com/sorensencc-dotcom/claude-setup.git"
          git submodule update --init --recursive

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Run tests
        run: npm test -- --ci --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
