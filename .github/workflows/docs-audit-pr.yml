name: Docs Audit on PR

on:
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --frozen-lockfile

      - name: Run docs audit
        run: npx tsx docs-manager/cli.ts audit

      - name: Run docs drift analysis
        run: npx tsx docs-manager/cli.ts drift

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-audit-report
          path: docs-manager/docs-audit-report.json

      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-drift-report
          path: docs-manager/docs-drift-report.json

      - name: Comment on PR
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Documentation audit failed. Check artifacts for drift report.'
            })
