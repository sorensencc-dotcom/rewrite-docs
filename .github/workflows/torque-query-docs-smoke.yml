name: torque-query-docs Smoke

# CI gate for the documentation RAG service in castironforge/torque-query-docs.
# Named per Tier 1 decision 2026-07-17 (split/rename), distinct from the
# memory-search TorqueQuery service in cic-ingestion. See
# docs/meta/phases/torquequery-reconciliation-charter.md in the main C:/dev
# repo, and castironforge/torque-query-docs/HARDENING-NOTES.md.

on:
  push:
    branches: [ main ]
    paths:
      - 'castironforge/torque-query-docs/**'
      - '.github/workflows/torque-query-docs-smoke.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'castironforge/torque-query-docs/**'
      - '.github/workflows/torque-query-docs-smoke.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: castironforge/torque-query-docs

jobs:
  test-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit + snapshot tests
        run: pytest -q

      # No Ollama service is provisioned on this runner, so smoke.py's own
      # Ollama-reachability probe will automatically skip the live /query and
      # /ingest checks and only verify the server boots and /health reports
      # healthy. That's still a real regression gate (import errors, config
      # load failures, and route wiring bugs all fail this step). The full
      # live-LLM smoke path (see scripts/smoke.py) is intended to be run
      # locally / on a machine with Ollama + the pinned models before merge.
      - name: Boot smoke check (health + query/ingest if Ollama is reachable)
        run: python scripts/smoke.py
