name: Phase 0.7 Build & Test

on:
  push:
    branches: [ master, phase-0.7 ]
  workflow_dispatch:
    inputs:
      phase:
        description: 'Target build node (all, cic.ingestion, labs.redesign.gpu, etc)'
        required: false
        default: 'all'

jobs:
  policy-compliance:
    runs-on: ubuntu-latest
    steps:
      - name: Configure Git
        run: git config --global submodule.recurse false

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Conftest
        run: |
          wget https://github.com/open-policy-agent/conftest/releases/download/v0.45.0/conftest_0.45.0_Linux_x86_64.tar.gz
          tar -xf conftest_0.45.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/

      - name: Run OPA Policy Audit
        run: |
          conftest test phase0.7/build-system/routing/phase0.7-routing.yaml -p phase0.7/policies/

  build-and-test:
    needs: policy-compliance
    runs-on: ubuntu-latest
    steps:
      - name: Configure Git
        run: git config --global submodule.recurse false

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Run Build DAG Queue
        run: |
          echo "Executing sequential Docker build queue..."
          # TODO: Replace with actual service Dockerfiles
          # - cic-ingestion uses cic-ingestion/Dockerfile
          # - cic-evolution not yet implemented
          # - labs services use build-system/docker/labs/ Dockerfiles
          echo "Skipping broken build-system/docker/cic builds (obsolete code)"
          # docker build -t labs-discovery:0.7.0 -f build-system/docker/labs/Dockerfile.discovery .
          # docker build -t labs-outreach:0.7.0 -f build-system/docker/labs/Dockerfile.outreach .

      - name: Audit & Commit Lineage
        if: success()
        run: |
          git config user.name "CIC Automation"
          git config user.email "ci@cic.dev"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "[automated] Phase 0.7 Build Ingestion/Evolution"
          git push origin master || true
