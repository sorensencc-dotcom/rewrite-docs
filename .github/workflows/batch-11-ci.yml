name: CI Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: false
      - name: Checkout submodules (private submodule authenticated separately)
        run: |
          git config --global url."https://x-access-token:${{ secrets.SUBMODULE_PAT }}@github.com/sorensencc-dotcom/claude-setup.git".insteadOf "https://github.com/sorensencc-dotcom/claude-setup.git"
          git submodule update --init --recursive
      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run lint
        run: npm run lint
      - name: Run tests
        run: npm test
      - name: Build
        run: npm run build
      - name: Publish artifacts
        if: github.ref == 'refs/heads/main'
        run: echo "Artifacts would be published here"
