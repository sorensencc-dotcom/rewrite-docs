# Prometheus Configuration for CIC Observability (Item 2)
# Generated: 2026-07-02
# Source: ITEM-2-OBSERVABILITY-DASHBOARD-SPEC.md

global:
  scrape_interval: 5s
  evaluation_interval: 5s
  external_labels:
    monitor: 'cic-runtime'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'localhost:9093'

# Load rules
rule_files:
  - 'alert-rules.yml'
  - 'slo-rules.yml'

scrape_configs:
  # CIC Adapter Metrics
  - job_name: 'cic-adapters'
    static_configs:
      - targets: ['localhost:3100']
    scrape_interval: 5s
    scrape_timeout: 2s
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # Qdrant Context Store
  - job_name: 'qdrant-store'
    static_configs:
      - targets: ['localhost:6333']
    scrape_interval: 30s
    metrics_path: '/metrics'

  # PostgreSQL (via postgres_exporter)
  - job_name: 'postgres-db'
    static_configs:
      - targets: ['localhost:9187']
    scrape_interval: 30s

  # Node Metrics (system CPU, memory, disk)
  - job_name: 'node-metrics'
    static_configs:
      - targets: ['localhost:9100']
    scrape_interval: 15s

# Remote storage (optional - for long-term retention)
# remote_write:
#   - url: "https://remote-prometheus-storage/api/v1/write"
#     queue_config:
#       capacity: 10000
#       max_shards: 200
#       min_shards: 1
#       max_samples_per_send: 1000
#       batch_send_wait: 100ms
#       min_backoff: 30ms
#       max_backoff: 100ms

# Retention policy
storage:
  tsdb:
    path: /prometheus
    retention: 7d
    retention_size: 100GB
