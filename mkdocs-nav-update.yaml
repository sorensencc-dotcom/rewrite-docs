## Instructions for Application

1. **Locate your mkdocs.yml** in repo root
2. **Find the `nav:` section** (usually starts around line 20-40)
3. **Insert these entries** at appropriate level (typically top-level or under an existing section)
4. **Adjust indentation** to match your existing structure (consistent 2-space indentation)
5. **Update GitHub links** if you use external skill references (replace `[repo]` with actual repo name)
6. **Run validation**: `mkdocs build --strict`

## Key Notes

- **Toolforge skills**: These are in `C:\dev\toolforge\skills\` which is outside the docs/ tree. Link to GitHub or create cross-refs.
- **JSON/MERMAID files**: Include these in nav if mkdocs supports direct rendering (check your theme)
- **Index files**: Create placeholder `index.md` files in category folders if they don't exist
- **Hierarchy**: Adjust nesting depth based on your information architecture

## Example Hierarchy

```yaml
nav:
  - Home: index.md
  - CIC:                          # Top level
    - Research Skill:             # 2nd level
      - SKILL.md                  # 3rd level (files)
      - Test Results:             # 3rd level (folder)
        - iteration-1.md          # 4th level (files)
```

---

## Validation Checklist

After applying this nav update:

- [ ] mkdocs.yml has valid YAML syntax (use YAML validator)
- [ ] All file paths exist and are relative to docs/ root
- [ ] No circular references or broken links
- [ ] Indentation is consistent (2 or 4 spaces, no tabs)
- [ ] Run `mkdocs build --strict` - no errors
- [ ] Run `mkdocs serve` - all links clickable in browser

