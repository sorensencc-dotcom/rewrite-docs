## SLA & Reliability

| Metric | Target | Notes |
|--------|--------|-------|
| Write latency (p50) | < 50ms | Memcached + PostgreSQL |
| Write latency (p99) | < 200ms | Outlier retry allowed |
| Query latency (p50) | < 100ms | Indexed by phase_id, timestamp |
| Query latency (p99) | < 500ms | Full-table scan fallback |
| Availability | 99.9% | 8.6 hours/month downtime max |
| Data retention | 30 days | Configurable per phase via ttl_seconds |
| Replication | 3x | Qdrant + PostgreSQL binlog |

---

## Authentication & Authorization

- **Auth method**: JWT bearer token (CIC internal)
- **Phases** mapped to roles:
  - Phase 23 (Memory): `role:memory-writer`
  - Phase 24+ (Consumers): `role:memory-reader`
  - Governance admins: `role:memory-admin`
- **Rate limits**: 1000 writes/min, 10000 queries/min per phase
- **Audit log**: All reads/writes logged for compliance

