## CIC ↔ Rewrite Labs Bridge

### POST /search/rl-query
Specialized endpoint for Rewrite Labs integration (Phase 30).

**Request:**
```json
{
  "query_type": "cost_estimation",
  "target_resource": "skill-webscraper-v2",
  "historical_lookback_days": 7,
  "filters": {
    "phase_ids": ["26"],
    "tags": ["rewrite-labs", "cost-analysis"]
  }
}
```

**Response:**
```json
{
  "query_id": "q-rl-cost-123",
  "cost_estimates": [
    {
      "timestamp": 1750900000,
      "tokens": 500000,
      "usd": 2.50,
      "source": "memory-mem-rl-001"
    }
  ],
  "trend": "stable",
  "recommendation": "safe_to_execute",
  "confidence": 0.88
}
```

---

### POST /search/cic-query
Specialized endpoint for CIC counterfactual reasoning (Phase 27).

**Request:**
```json
{
  "query_type": "state_replay",
  "target_phase": "25",
  "counterfactual_scenario": "if_skill_X_had_succeeded",
  "memory_window_hours": 24
}
```

**Response:**
```json
{
  "query_id": "q-crf-xyz",
  "replay_packets": [
    {
      "original_outcome": "skill_failed",
      "hypothetical_outcome": "skill_succeeded",
      "confidence": 0.72,
      "evidence": ["mem-xyz-125", "mem-xyz-126"]
    }
  ]
}
```

