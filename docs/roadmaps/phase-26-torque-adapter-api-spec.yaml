## SLA & Reliability

| Metric | Target | Notes |
|--------|--------|-------|
| Full-text query latency (p50) | < 100ms | Inverted index |
| Semantic query latency (p99) | < 1000ms | Vector similarity |
| Index ingest latency (p50) | < 50ms per doc | Batch async |
| Index capacity | 10 GB | ≈500K documents |
| Availability | 99.95% | <22 min/month downtime |
| Data freshness | <5 min | Async indexing lag |
| Index retention | Per TTL | Tied to Phase 23 memory TTL |

---

## Authentication & Authorization

- **Auth**: JWT (same as Phase 23/24)
- **Roles**:
  - `role:search-reader`: Query endpoints (all phases)
  - `role:index-writer`: Document ingestion (Phase 23, 24)
  - `role:index-admin`: Reindex, stats (admins only)
- **Rate limits**: 5000 queries/min per phase, 100 ingest batches/min

