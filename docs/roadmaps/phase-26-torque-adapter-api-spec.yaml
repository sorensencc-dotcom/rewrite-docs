## API Endpoints

### POST /search/query
Full-text + semantic search across indexed documents.

**Request:**
```json
{
  "query_text": "skill execution failed with timeout",
  "semantic_search": false,
  "filters": {
    "source_type": "memory_packet",
    "phase_ids": ["23", "24"],
    "date_range": {
      "start_time": 1750900000,
      "end_time": 1751000000
    },
    "confidence_min": 0.80
  },
  "limit": 20,
  "sort_by": "relevance"
}
```

**Response:**
```json
{
  "query_id": "q-xyz-789",
  "total_hits": 47,
  "returned": 20,
  "results": [
    {
      "id": "memory-mem-xyz-123",
      "score": 0.95,
      "source_type": "memory_packet",
      "source_id": "mem-xyz-123",
      "matched_content": "...skill execution <mark>failed with timeout</mark> after 45s...",
      "indexed_fields": {
        "phase_id": "23.4",
        "timestamp": 1751000000,
        "confidence": 0.92
      },
      "url_reference": "https://cic.internal/memory/mem-xyz-123"
    }
  ],
  "took_ms": 125,
  "next_page_token": "offset-20"
}
```

**Errors:**
- `400 Bad Request`: Invalid query syntax or filters
- `408 Request Timeout`: Semantic search exceeded 5s (retry with semantic_search=false)
- `503 Service Unavailable`: Index unavailable (auto-retry)

---

### POST /search/semantic
Similarity search using vector embeddings (for reasoning chains).

**Request:**
```json
{
  "query_embedding": [0.1, 0.2, ..., 0.9],
  "embedding_model": "text-embedding-3-small",
  "filters": {
    "source_type": "memory_packet",
    "phase_ids": ["23"]
  },
  "similarity_threshold": 0.75,
  "limit": 10
}
```

**Response:**
```json
{
  "query_id": "q-semantic-456",
  "total_hits": 12,
  "returned": 10,
  "results": [
    {
      "id": "memory-mem-xyz-124",
      "score": 0.91,
      "similarity": 0.91,
      "source_type": "memory_packet",
      "matched_content": "...counterfactual drift observed in policy rail 7...",
      "url_reference": "https://cic.internal/memory/mem-xyz-124"
    }
  ],
  "took_ms": 850
}
```

---

### POST /index/documents
Bulk ingest documents from Phase 23/24 (Phase 23 writes; TorqueQuery indexes).

**Request:**
```json
{
  "documents": [
    {
      "id": "memory-mem-xyz-123",
      "source_type": "memory_packet",
      "source_id": "mem-xyz-123",
      "document_type": "reasoning_chain",
      "content": "Step 1: Observed drift 12%. Step 2: Hypothesized KG shift...",
      "indexed_fields": {
        "phase_id": "23.4",
        "timestamp": 1751000000,
        "confidence": 0.92,
        "agent_id": "observer-1"
      },
      "embeddings": {
        "model": "text-embedding-3-small",
        "vector": [0.1, 0.2, ..., 0.9]
      }
    }
  ],
  "batch_id": "batch-ingest-20260704-1"
}
```

**Response:**
```json
{
  "batch_id": "batch-ingest-20260704-1",
  "indexed": 1,
  "failed": 0,
  "failures": [],
  "index_version": "v26.1.2"
}
```

**Errors:**
- `400 Bad Request`: Invalid document schema
- `413 Payload Too Large`: Batch > 100 MB
- `507 Insufficient Storage`: Index at capacity

