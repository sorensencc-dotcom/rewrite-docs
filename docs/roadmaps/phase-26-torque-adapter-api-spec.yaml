### POST /index/reindex
Rebuild index from source (Phase 23/24 APIs). Async operation.

**Request:**
```json
{
  "source_types": ["memory_packet", "governance_decision"],
  "start_time": 1750800000,
  "end_time": 1751000000,
  "regenerate_embeddings": false
}
```

**Response:**
```json
{
  "reindex_id": "reindex-xyz",
  "status": "queued",
  "estimated_duration_seconds": 600,
  "progress_url": "https://cic.internal/index/reindex/reindex-xyz"
}
```

