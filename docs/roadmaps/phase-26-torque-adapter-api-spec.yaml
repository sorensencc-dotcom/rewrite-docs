# Phase 26: TorqueQuery Adapter API Specification

## Overview
Open-source ingestion + search engine. Indexes Phase 23 memory packets + Phase 24 governance decisions. Enables CIC counterfactual reasoning by querying past states.

## Core Data Models

### IndexableDocument
```yaml
type: IndexableDocument
description: Searchable record from Phase 23 or 24
fields:
  id:
    type: string
    format: "{source_type}-{source_id}"
    example: "memory-mem-xyz-123"

  source_type:
    type: enum
    options: [memory_packet, governance_decision, policy_rail, evidence_packet]

  source_id:
    type: string
    immutable: true

  document_type:
    type: enum
    options: [reasoning_chain, state_snapshot, evidence, policy, decision]

  content:
    type: string
    description: Full-text searchable body
    max_length: 100000

  indexed_fields:
    type: object
    description: Structured metadata for faceted search
    fields:
      phase_id: string
      agent_id: string
      timestamp: integer
      confidence: float
      severity: string
      source_phase: string

  embeddings:
    type: object
    description: Vector representation for semantic search
    fields:
      model: string
        example: "text-embedding-3-small"
      vector: array[float]
        dimensions: 1536
      generated_at: integer

  created_at:
    type: integer
    unix_epoch_ms: true

  expires_at:
    type: integer
    unix_epoch_ms: true
    nullable: true
```

### SearchQuery
```yaml
type: SearchQuery
description: Query against indexed documents
fields:
  query_text:
    type: string
    description: Full-text search string
    required: true

  semantic_search:
    type: boolean
    default: false
    description: Use vector similarity (slower, more intelligent)

  filters:
    type: object
    description: Structured facets
    fields:
      source_type: enum[memory_packet, governance_decision, policy_rail]
      phase_ids: array[string]
      date_range:
        start_time: integer (unix_epoch_ms)
        end_time: integer (unix_epoch_ms)
      confidence_min: float (0.0-1.0)
      severity: enum[critical, high, medium, low]
      tags: array[string]

  limit:
    type: integer
    default: 50
    max: 1000

  offset:
    type: integer
    default: 0

  sort_by:
    type: enum
    options: [relevance, timestamp_desc, confidence_desc]
    default: relevance
```

### SearchResult
```yaml
type: SearchResult
description: Single search hit
fields:
  id:
    type: string

  score:
    type: float
    description: Relevance score (0.0-1.0)

  source_type:
    type: enum

  source_id:
    type: string

  matched_content:
    type: string
    description: Excerpt with query terms highlighted

  indexed_fields:
    type: object

  timestamp:
    type: integer

  url_reference:
    type: string
    nullable: true
    description: Link to full document in memory/governance API
```

