## SLA & Reliability

| Metric | Target | Notes |
|--------|--------|-------|
| Policy query latency (p50) | < 50ms | In-memory cache |
| Proposal submission latency (p99) | < 200ms | Async write-behind |
| Vote submission latency (p99) | < 100ms | Atomic, no retry |
| Decision announcement latency | < 5s | Broadcast to all phases |
| Audit log retention | 90 days | Immutable for compliance |
| Council majority threshold | 3/5 | Configurable, default majority |

---

## Authentication & Authorization

- **Auth**: JWT (same as Phase 23)
- **Roles**:
  - `role:policy-reader`: Query rails (all phases)
  - `role:proposal-submitter`: Create proposals (phases 23+)
  - `role:council-member`: Vote (humans + oracle)
  - `role:governance-admin`: Update policies
- **Rate limits**: 100 proposals/min per phase, 10 votes/min per member

