## API Endpoints

### GET /governance/policy-rails
List active policy rails. All phases can query.

**Query params:**
```
governance_version=governance.v24.2
severity=critical,high
rule_type=approval_required
phase_id=25
```

**Response:**
```json
{
  "version": "governance.v24.2",
  "rails": [
    {
      "id": "rail-governance.v24.2-1",
      "name": "No skill execution without council approval",
      "severity": "critical",
      "rule_type": "approval_required",
      "condition": {
        "phase_ids": ["25"],
        "skill_ids": ["*"],
        "resource_types": ["computation"]
      },
      "enforcement": "block",
      "evidence_requirement": "council_approval",
      "created_at": 1750800000
    }
  ],
  "total": 1,
  "effective_until": 1753392000
}
```

---

### POST /governance/proposals
Submit action for council decision.

**Request:**
```json
{
  "action_type": "skill_execution",
  "target_resource": "skill-webscraper-v2",
  "requested_by": "phase-25.2",
  "evidence_packet_id": "ev-xyz-456",
  "decision_deadline": 1751086400,
  "voting_threshold": "supermajority"
}
```

**Response:**
```json
{
  "proposal_id": "prop-abc-789",
  "status": "pending",
  "votes_required": 3,
  "votes_received": 0,
  "decision_deadline": 1751086400
}
```

**Errors:**
- `400 Bad Request`: Missing evidence_packet_id
- `403 Forbidden`: action_type blocked by active policy rail
- `404 Not Found`: evidence_packet_id doesn't exist

---

### POST /governance/proposals/{proposal_id}/vote
Cast council vote.

**Request:**
```json
{
  "member_id": "council-observer-2",
  "decision": "approve",
  "reasoning": "Cost estimate acceptable, memory packets support approval",
  "confidence": 0.95
}
```

**Response:**
```json
{
  "vote_id": "vote-xyz",
  "proposal_id": "prop-abc-789",
  "decision": "approve",
  "signature": "sha256:def456...",
  "timestamp": 1751000050,
  "votes_to_threshold": 1
}
```

**Errors:**
- `400 Bad Request`: Member already voted
- `410 Gone`: Proposal expired or decided

---

### POST /governance/evidence-packets
Store evidence for proposal (Phase 23 writes; governance reads).

**Request:**
```json
{
  "proposal_id": "prop-abc-789",
  "source_phase": "23.4",
  "memory_packets": [
    "mem-xyz-123",
    "mem-xyz-124"
  ],
  "observations": [
    {
      "timestamp": 1751000000,
      "metric": "skill_error_rate",
      "value": 0.02,
      "confidence": 0.98
    }
  ],
  "risk_assessment": {
    "risk_level": "medium",
    "mitigations": [
      "Sandbox skill execution",
      "Limit concurrency to 1",
      "Auto-rollback on failure"
    ],
    "residual_risk": 0.15
  },
  "cost_estimate": {
    "tokens": 500000,
    "usd": 2.50,
    "confidence": 0.92
  }
}
```

**Response:**
```json
{
  "packet_id": "ev-xyz-456",
  "proposal_id": "prop-abc-789",
  "created_at": 1751000040,
  "cost_estimate_approved": false,
  "cost_approved_deadline": 1751086440
}
```

---

### GET /governance/proposals/{proposal_id}
Retrieve proposal + vote status.

**Response:**
```json
{
  "proposal_id": "prop-abc-789",
  "action_type": "skill_execution",
  "target_resource": "skill-webscraper-v2",
  "status": "approved",
  "evidence_packet_id": "ev-xyz-456",
  "votes": [
    {
      "member_id": "council-observer-2",
      "decision": "approve",
      "confidence": 0.95,
      "timestamp": 1751000050
    }
  ],
  "decision_deadline": 1751086400,
  "executed_at": 1751000060
}
```

---

### POST /governance/policies/update
Submit new policy rail (governance admins + supermajority only).

**Request:**
```json
{
  "governance_version": "governance.v24.3",
  "new_rails": [
    {
      "name": "TorqueQuery cost ceiling",
      "rule_type": "cost_limit",
      "condition": {
        "phase_ids": ["26"],
        "cost_threshold": 1000
      },
      "enforcement": "warn",
      "evidence_requirement": "none"
    }
  ],
  "expires_at": 1753392000
}
```

**Response:**
```json
{
  "governance_version": "governance.v24.3",
  "rails_staged": 1,
  "requires_council_approval": true,
  "approval_deadline": 1751000400
}
```

