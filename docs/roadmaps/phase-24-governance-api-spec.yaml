# Phase 24: Governance API Specification

## Overview
Policy rails + council voting + evidence vault. Ensures CIC decisions stay within human-defined guardrails. Phase 23 memory feeds evidence; Phase 25 skills query policy.

## Core Data Models

### PolicyRail
```yaml
type: PolicyRail
description: Rule constraining CIC behavior
fields:
  id:
    type: string
    format: "rail-{governance_version}-{index}"
    immutable: true

  governance_version:
    type: string
    format: "governance.v{major}.{minor}"
    example: "governance.v24.2"

  name:
    type: string
    description: Human-readable rail name
    example: "No skill execution without council approval"

  severity:
    type: enum
    options: [critical, high, medium, low]
    description: Impact of violation

  rule_type:
    type: enum
    options: [capability_gate, approval_required, cost_limit, latency_bound, data_access, skill_isolation]

  condition:
    type: object
    description: When rule applies
    fields:
      phase_ids: array[string]        # Which phases trigger
      skill_ids: array[string]        # Which skills affected
      resource_types: array[string]   # VM, network, storage, etc.
      cost_threshold: number          # Optional: tokens or USD

  enforcement:
    type: enum
    options: [block, warn, audit, defer]
    description: Action on violation

  evidence_requirement:
    type: enum
    options: [none, memory_packet, observation, council_approval]
    description: What must accompany decision

  created_at:
    type: integer
    unix_epoch_ms: true

  expires_at:
    type: integer
    unix_epoch_ms: true
    nullable: true
    description: Null = permanent
```

### CouncilVote
```yaml
type: CouncilVote
description: Council member decision on proposed action
fields:
  id:
    type: string
    format: "vote-{uuid}"

  proposal_id:
    type: string
    required: true
    description: What is being voted on

  member_id:
    type: string
    description: Council member identifier

  decision:
    type: enum
    options: [approve, reject, abstain, defer]

  reasoning:
    type: string
    description: Justification (>20 chars, required for reject)

  confidence:
    type: float
    range: [0.0, 1.0]
    description: Member confidence in decision

  timestamp:
    type: integer
    unix_epoch_ms: true

  signature:
    type: string
    format: "sha256:{hash}"
    description: Immutable vote commitment
```

### EvidencePacket
```yaml
type: EvidencePacket
description: Fact bundle supporting decision
fields:
  id:
    type: string
    format: "ev-{uuid}"

  proposal_id:
    type: string
    required: true

  source_phase:
    type: string
    example: "23.4"

  memory_packets:
    type: array[string]
    description: Phase 23 memory IDs referenced

  observations:
    type: array
    items:
      type: object
      fields:
        timestamp: integer
        metric: string
        value: number
        confidence: float

  risk_assessment:
    type: object
    fields:
      risk_level: enum [low, medium, high, critical]
      mitigations: array[string]
      residual_risk: float (0.0-1.0)

  cost_estimate:
    type: object
    fields:
      tokens: integer
      usd: number
      confidence: float
```

### ProposalForDecision
```yaml
type: Proposal
description: Action awaiting council decision
fields:
  id:
    type: string
    format: "prop-{uuid}"

  action_type:
    type: enum
    options: [skill_execution, memory_purge, policy_update, resource_allocation, emergency_rollback]

  target_resource:
    type: string
    description: What object is affected (skill_id, memory_packet_id, policy_rail_id)

  requested_by:
    type: string
    description: Phase/agent requesting decision

  evidence_packet_id:
    type: string
    required: true

  decision_deadline:
    type: integer
    unix_epoch_ms: true
    description: Time limit for council vote

  voting_threshold:
    type: enum
    options: [majority, supermajority, unanimous, single_approval]

  votes:
    type: array[CouncilVote]

  status:
    type: enum
    options: [pending, approved, rejected, deferred, expired]

  executed_at:
    type: integer
    nullable: true
    unix_epoch_ms: true
```

