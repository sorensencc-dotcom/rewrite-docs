<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIC Knowledge Graph Viewer</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            gap: 0;
        }

        .sidebar {
            width: 320px;
            background: #141414;
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 2px 0 8px rgba(0, 0, 0, 0.5);
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #222;
            background: #0a0a0a;
        }

        .sidebar-header h1 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #00ff88;
        }

        .sidebar-header .stats {
            font-size: 12px;
            color: #666;
            line-height: 1.6;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .search-box {
            margin-bottom: 20px;
        }

        .search-box input {
            width: 100%;
            padding: 8px 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            color: #e0e0e0;
            font-size: 13px;
        }

        .search-box input:focus {
            outline: none;
            border-color: #00ff88;
            box-shadow: 0 0 8px rgba(0, 255, 136, 0.2);
        }

        .filter-group {
            margin-bottom: 20px;
        }

        .filter-group h3 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #00ff88;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .filter-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .filter-item {
            display: flex;
            align-items: center;
            padding: 6px 8px;
            border-radius: 3px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 12px;
        }

        .filter-item:hover {
            background: #1a1a1a;
        }

        .filter-item input[type="checkbox"] {
            margin-right: 8px;
            cursor: pointer;
            accent-color: #00ff88;
        }

        .node-details {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 12px;
        }

        .node-details-title {
            font-weight: 600;
            color: #00ff88;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .node-details-category {
            display: inline-block;
            background: rgba(0, 255, 136, 0.15);
            color: #00ff88;
            padding: 2px 8px;
            border-radius: 2px;
            font-size: 11px;
            margin-bottom: 8px;
        }

        .node-details-section {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #333;
        }

        .node-details-section h4 {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .node-links {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .node-link {
            padding: 4px;
            background: rgba(0, 255, 136, 0.08);
            border-left: 2px solid #00ff88;
            cursor: pointer;
            border-radius: 2px;
            transition: background 0.2s;
            word-break: break-word;
        }

        .node-link:hover {
            background: rgba(0, 255, 136, 0.15);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0a0a0a;
        }

        .toolbar {
            padding: 16px;
            border-bottom: 1px solid #222;
            background: #0a0a0a;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .toolbar button {
            padding: 8px 16px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            color: #e0e0e0;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .toolbar button:hover {
            border-color: #00ff88;
            color: #00ff88;
        }

        .toolbar button.active {
            background: #00ff88;
            color: #0a0a0a;
            border-color: #00ff88;
        }

        .canvas {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .node {
            stroke: #333;
            stroke-width: 1.5px;
            cursor: pointer;
            transition: filter 0.2s;
        }

        .node:hover {
            filter: brightness(1.3);
            stroke-width: 2px;
            stroke: #00ff88;
        }

        .node.selected {
            stroke: #00ff88;
            stroke-width: 3px;
            filter: brightness(1.4);
        }

        .link {
            stroke: #333;
            stroke-width: 1.5px;
            fill: none;
            opacity: 0.6;
        }

        .link.highlighted {
            stroke: #00ff88;
            stroke-width: 2px;
            opacity: 1;
        }

        .node-label {
            font-size: 11px;
            fill: #e0e0e0;
            text-anchor: middle;
            pointer-events: none;
            dominant-baseline: middle;
        }

        .legend {
            position: absolute;
            bottom: 16px;
            right: 16px;
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid #333;
            border-radius: 4px;
            padding: 12px;
            font-size: 12px;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .legend-item:last-child {
            margin-bottom: 0;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .tooltip {
            position: absolute;
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid #333;
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 11px;
            pointer-events: none;
            z-index: 20;
            display: none;
        }

        .tooltip.visible {
            display: block;
        }

        .scrollbar-thin::-webkit-scrollbar {
            width: 6px;
        }

        .scrollbar-thin::-webkit-scrollbar-track {
            background: transparent;
        }

        .scrollbar-thin::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        .scrollbar-thin::-webkit-scrollbar-thumb:hover {
            background: #444;
        }

        .sidebar-content {
            scrollbar-color: #333 transparent;
            scrollbar-width: thin;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar scrollbar-thin">
            <div class="sidebar-header">
                <h1>CIC Knowledge Graph</h1>
                <div class="stats">
                    <div id="statsNodes">Nodes: 0</div>
                    <div id="statsEdges">Edges: 0</div>
                    <div id="statsTimestamp">Updated: --</div>
                </div>
            </div>
            <div class="sidebar-content scrollbar-thin">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search concepts...">
                </div>

                <div class="filter-group">
                    <h3>Categories</h3>
                    <div class="filter-list" id="categoryFilters"></div>
                </div>

                <div class="filter-group">
                    <h3>Edge Types</h3>
                    <div class="filter-list" id="edgeTypeFilters"></div>
                </div>

                <div id="nodeDetails"></div>
            </div>
        </div>

        <div class="main-content">
            <div class="toolbar">
                <button id="resetBtn" title="Reset zoom and pan">Reset View</button>
                <button id="fitBtn" title="Fit all nodes in view">Fit to Screen</button>
                <button id="toggleLabelsBtn" class="active" title="Toggle node labels">Labels: ON</button>
                <button id="toggleSimulationBtn" class="active" title="Toggle force simulation">Simulation: ON</button>
                <span style="flex: 1;"></span>
                <span id="graphStatus" style="color: #666; font-size: 12px;"></span>
            </div>

            <div class="canvas">
                <svg></svg>
                <div class="tooltip" id="tooltip"></div>
                <div class="legend">
                    <div style="margin-bottom: 8px; font-weight: 600; color: #00ff88;">Categories</div>
                    <div id="legendCategories"></div>
                    <div style="margin: 12px 0; border-top: 1px solid #333;"></div>
                    <div style="margin-bottom: 8px; font-weight: 600; color: #00ff88;">Edge Types</div>
                    <div id="legendEdges"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const CATEGORY_COLORS = {
            agent: '#FF6B9D',
            phase: '#4ECDC4',
            extractor: '#95E1D3',
            roadmap: '#FFE66D',
            token_pack: '#A8E6CF',
            principle: '#FF6B9D',
            observability: '#FFD3B6',
            security: '#FF6B9D',
            api_contract: '#FFAAA5',
            schema: '#AA96DA',
            pattern: '#FCB4D5',
            configuration: '#B4D7FF',
            concept: '#888',
        };

        const EDGE_COLORS = {
            implements: '#00ff88',
            uses: '#4ECDC4',
            depends_on: '#FFE66D',
            describes: '#A8E6CF',
            extends: '#FF6B9D',
            references: '#888',
        };

        let graphData = null;
        let selectedNode = null;
        let simulation = null;
        let showLabels = true;
        let simulationRunning = true;

        // Initialize
        async function init() {
            // Try to load graph.json from current directory
            try {
                const response = await fetch('graph.json');
                if (response.ok) {
                    graphData = await response.json();
                    renderUI();
                } else {
                    showPlaceholder();
                }
            } catch (e) {
                console.error('Failed to load graph.json:', e);
                showPlaceholder();
            }
        }

        function showPlaceholder() {
            const svg = d3.select('svg');
            svg.append('text')
                .attr('x', '50%')
                .attr('y', '50%')
                .attr('text-anchor', 'middle')
                .attr('dominant-baseline', 'middle')
                .attr('fill', '#666')
                .attr('font-size', '16px')
                .text('No graph data loaded. Place graph.json in the same directory.');
        }

        function renderUI() {
            // Update stats
            document.getElementById('statsNodes').textContent = `Nodes: ${graphData.nodes.length}`;
            document.getElementById('statsEdges').textContent = `Edges: ${graphData.edges.length}`;
            const timestamp = new Date(graphData.timestamp).toLocaleString();
            document.getElementById('statsTimestamp').textContent = `Updated: ${timestamp}`;

            // Build category filters
            const categoryFilters = document.getElementById('categoryFilters');
            for (const [category, count] of Object.entries(graphData.metadata.categories)) {
                const label = document.createElement('label');
                label.className = 'filter-item';
                label.innerHTML = `
                    <input type="checkbox" class="categoryFilter" value="${category}" checked>
                    <span>${category} (${count})</span>
                `;
                categoryFilters.appendChild(label);
            }

            // Build edge type filters
            const edgeTypeFilters = document.getElementById('edgeTypeFilters');
            for (const [type, count] of Object.entries(graphData.metadata.edgeTypes)) {
                const label = document.createElement('label');
                label.className = 'filter-item';
                label.innerHTML = `
                    <input type="checkbox" class="edgeTypeFilter" value="${type}" checked>
                    <span>${type} (${count})</span>
                `;
                edgeTypeFilters.appendChild(label);
            }

            // Build legend
            buildLegend();

            // Setup event listeners
            setupEventListeners();

            // Render graph
            renderGraph();
        }

        function buildLegend() {
            const legendCat = document.getElementById('legendCategories');
            for (const [category, color] of Object.entries(CATEGORY_COLORS)) {
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.innerHTML = `
                    <div class="legend-color" style="background: ${color};"></div>
                    <span>${category}</span>
                `;
                legendCat.appendChild(item);
            }

            const legendEdges = document.getElementById('legendEdges');
            for (const [type, color] of Object.entries(EDGE_COLORS)) {
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.innerHTML = `
                    <div style="width: 12px; height: 2px; background: ${color};"></div>
                    <span>${type}</span>
                `;
                legendEdges.appendChild(item);
            }
        }

        function setupEventListeners() {
            // Search
            document.getElementById('searchInput').addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                d3.selectAll('.node').classed('hidden', (d) =>
                    !d.label.toLowerCase().includes(query) && !d.id.toLowerCase().includes(query)
                );
            });

            // Category filters
            document.querySelectorAll('.categoryFilter').forEach((checkbox) => {
                checkbox.addEventListener('change', updateFilters);
            });

            // Edge type filters
            document.querySelectorAll('.edgeTypeFilter').forEach((checkbox) => {
                checkbox.addEventListener('change', updateFilters);
            });

            // Toolbar buttons
            document.getElementById('resetBtn').addEventListener('click', resetZoom);
            document.getElementById('fitBtn').addEventListener('click', fitToScreen);
            document.getElementById('toggleLabelsBtn').addEventListener('click', toggleLabels);
            document.getElementById('toggleSimulationBtn').addEventListener('click', toggleSimulation);
        }

        function getActiveCategories() {
            return Array.from(document.querySelectorAll('.categoryFilter:checked')).map(
                (cb) => cb.value
            );
        }

        function getActiveEdgeTypes() {
            return Array.from(document.querySelectorAll('.edgeTypeFilter:checked')).map(
                (cb) => cb.value
            );
        }

        function updateFilters() {
            const categories = getActiveCategories();
            const edgeTypes = getActiveEdgeTypes();

            d3.selectAll('.node').classed('hidden', (d) => !categories.includes(d.category));
            d3.selectAll('.link').classed('hidden', (d) => !edgeTypes.includes(d.type));
        }

        function renderGraph() {
            const width = document.querySelector('.canvas').clientWidth;
            const height = document.querySelector('.canvas').clientHeight;

            const svg = d3.select('svg').attr('viewBox', [0, 0, width, height]);

            // Clear existing
            svg.selectAll('*').remove();

            // Add zoom behavior
            const zoom = d3.zoom().on('zoom', (event) => {
                g.attr('transform', event.transform);
            });
            svg.call(zoom);

            const g = svg.append('g');

            // Create force simulation
            simulation = d3.forceSimulation(graphData.nodes)
                .force('link', d3.forceLink(graphData.edges).id((d) => d.id).distance(80))
                .force('charge', d3.forceManyBody().strength(-300))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide().radius(30));

            // Links
            const links = g
                .selectAll('.link')
                .data(graphData.edges)
                .join('line')
                .attr('class', 'link')
                .attr('stroke', (d) => EDGE_COLORS[d.type] || '#333')
                .attr('data-type', (d) => d.type);

            // Nodes
            const nodes = g
                .selectAll('.node')
                .data(graphData.nodes)
                .join('circle')
                .attr('class', 'node')
                .attr('r', (d) => {
                    // Size based on connection count
                    const connections = graphData.edges.filter(
                        (e) => e.source === d.id || e.target === d.id
                    ).length;
                    return Math.min(4 + connections / 3, 12);
                })
                .attr('fill', (d) => CATEGORY_COLORS[d.category] || '#999')
                .attr('data-id', (d) => d.id)
                .attr('data-category', (d) => d.category)
                .on('click', (event, d) => selectNode(d))
                .on('mouseover', (event, d) => {
                    showTooltip(event, d);
                    highlightNode(d);
                })
                .on('mouseout', () => {
                    hideTooltip();
                    unhighlightNode();
                });

            // Labels
            const labels = g
                .selectAll('.node-label')
                .data(graphData.nodes)
                .join('text')
                .attr('class', 'node-label')
                .attr('text', (d) => d.label)
                .text((d) => d.label);

            // Update positions on simulation tick
            simulation.on('tick', () => {
                links
                    .attr('x1', (d) => d.source.x)
                    .attr('y1', (d) => d.source.y)
                    .attr('x2', (d) => d.target.x)
                    .attr('y2', (d) => d.target.y);

                nodes.attr('cx', (d) => d.x).attr('cy', (d) => d.y);

                labels.attr('x', (d) => d.x).attr('y', (d) => d.y);
            });
        }

        function selectNode(d) {
            selectedNode = d;
            d3.selectAll('.node').classed('selected', (n) => n.id === d.id);

            // Show details in sidebar
            const details = document.getElementById('nodeDetails');
            details.innerHTML = `
                <div class="node-details">
                    <div class="node-details-title">${d.label}</div>
                    <div class="node-details-category">${d.category}</div>
                    ${d.description ? `<div style="color: #999; font-size: 11px; margin-top: 6px;">${d.description}</div>` : ''}
                    <div class="node-details-section">
                        <h4>File</h4>
                        <div style="color: #0ff; word-break: break-all;">${d.file}</div>
                    </div>
                    <div class="node-details-section">
                        <h4>Depends On</h4>
                        <div class="node-links">
                            ${graphData.edges
                    .filter((e) => e.source === d.id)
                    .map((e) => {
                        const target = graphData.nodes.find((n) => n.id === e.target);
                        return `<div class="node-link" onclick="selectNodeById('${target.id}')">${target.label}</div>`;
                    })
                    .join('')}
                        </div>
                    </div>
                    <div class="node-details-section">
                        <h4>Used By</h4>
                        <div class="node-links">
                            ${graphData.edges
                    .filter((e) => e.target === d.id)
                    .map((e) => {
                        const source = graphData.nodes.find((n) => n.id === e.source);
                        return `<div class="node-link" onclick="selectNodeById('${source.id}')">${source.label}</div>`;
                    })
                    .join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function selectNodeById(id) {
            const node = graphData.nodes.find((n) => n.id === id);
            if (node) selectNode(node);
        }

        function highlightNode(d) {
            const relatedIds = new Set([d.id]);
            graphData.edges.forEach((e) => {
                if (e.source === d.id) relatedIds.add(e.target);
                if (e.target === d.id) relatedIds.add(e.source);
            });

            d3.selectAll('.node').classed('dimmed', (n) => !relatedIds.has(n.id));
            d3.selectAll('.link').classed(
                'highlighted',
                (e) => e.source === d.id || e.target === d.id
            );
        }

        function unhighlightNode() {
            d3.selectAll('.node').classed('dimmed', false);
            d3.selectAll('.link').classed('highlighted', false);
        }

        function showTooltip(event, d) {
            const tooltip = document.getElementById('tooltip');
            tooltip.innerHTML = `<strong>${d.label}</strong><br><span style="color: #00ff88;">${d.category}</span>`;
            tooltip.classList.add('visible');
            tooltip.style.left = event.pageX + 10 + 'px';
            tooltip.style.top = event.pageY + 10 + 'px';
        }

        function hideTooltip() {
            document.getElementById('tooltip').classList.remove('visible');
        }

        function resetZoom() {
            d3.select('svg').transition().duration(750).call(
                d3.zoom().transform,
                d3.zoomIdentity.translate(50, 50)
            );
        }

        function fitToScreen() {
            const svg = d3.select('svg');
            const bounds = d3.select('svg g').node().getBBox();
            const fullWidth = svg.attr('viewBox').split(' ')[2];
            const fullHeight = svg.attr('viewBox').split(' ')[3];
            const midX = bounds.x + bounds.width / 2;
            const midY = bounds.y + bounds.height / 2;
            const scale = 0.8 / Math.max(bounds.width / fullWidth, bounds.height / fullHeight);
            const translate = [fullWidth / 2 - scale * midX, fullHeight / 2 - scale * midY];

            svg.transition().duration(750).call(
                d3.zoom().transform,
                d3.zoomIdentity.translate(translate[0], translate[1]).scale(scale)
            );
        }

        function toggleLabels() {
            showLabels = !showLabels;
            d3.selectAll('.node-label').style('display', showLabels ? 'block' : 'none');
            document.getElementById('toggleLabelsBtn').textContent = `Labels: ${showLabels ? 'ON' : 'OFF'}`;
            document.getElementById('toggleLabelsBtn').classList.toggle('active');
        }

        function toggleSimulation() {
            simulationRunning = !simulationRunning;
            if (simulationRunning) {
                simulation.alpha(1).restart();
            } else {
                simulation.stop();
            }
            document.getElementById('toggleSimulationBtn').textContent = `Simulation: ${simulationRunning ? 'ON' : 'OFF'}`;
            document.getElementById('toggleSimulationBtn').classList.toggle('active');
        }

        // Start
        init();
    </script>
</body>
</html>
